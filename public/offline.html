<!DOCTYPE html>
<html lang="en-PH">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wala Koneksyon — Civic Metro Iloilo Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f4f4f5;
      color: #18181b;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1.5rem;
      text-align: center;
    }
    .card {
      background: #fff;
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 1rem;
      padding: 2.5rem 2rem;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .icon { font-size: 3rem; margin-bottom: 1rem; }
    h1 { font-size: 1.25rem; font-weight: 700; color: #18181b; margin-bottom: 0.5rem; }
    p  { font-size: 0.875rem; color: #71717a; line-height: 1.6; margin-bottom: 0.25rem; }
    .btn {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.6rem 1.4rem;
      background: #01696f;
      color: #fff;
      border: none;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
    }
    .btn:hover { background: #015a5f; }
    .emergency {
      margin-top: 1.5rem;
      padding: 1rem;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 0.5rem;
      font-size: 0.8rem;
      color: #b91c1c;
    }
    .emergency strong { display: block; margin-bottom: 0.25rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>Wala Koneksyon / No Connection</h1>
    <p>Wala ka sang koneksyon sa internet sa pagkaron.</p>
    <p>You are currently offline. Please check your network and try again.</p>
    <button class="btn" onclick="window.location.reload()">Try Again / Subuka Liwat</button>
    <div class="emergency">
      <strong>🚨 Emergency Contacts</strong>
      ICER: (033) 320-0341 &nbsp;|&nbsp; CDRRMO: (033) 336-0226 &nbsp;|&nbsp; PNP / BFP / Medical: 911
    </div>
  </div>
</body>
</html>
