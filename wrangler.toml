# Cloudflare Pages / Workers configuration
# https://developers.cloudflare.com/workers/wrangler/configuration/

name = "civic-metro-iloilo-dashboard"
compatibility_date = "2024-09-23"
pages_build_output_dir = "dist"

# ---- D1 Database binding ---------------------------------------------------
[[d1_databases]]
binding       = "DB"
database_name = "civic-iloilo-db"
database_id   = "f5c2e5d9-d5c7-45a9-acd5-f1e2d296bbba"

# ---- Cron Triggers ---------------------------------------------------------
# Fuel price auto-sync: every Tuesday at 00:00 UTC = 08:00 PHT
# Cloudflare Pages does NOT support cron triggers natively.
# Deploy sync worker separately:
#   wrangler deploy functions/api/fuel-prices/sync.js --name civic-fuel-cron
# Then add cron in Cloudflare Dashboard:
#   Workers & Pages → civic-fuel-cron → Triggers → Add Cron Trigger: 0 0 * * 2

# ---- Environment variables (set in Cloudflare Pages dashboard) -------------
# JWT_SECRET            = <long random string>
# VAPID_PUBLIC_KEY      = <from npx web-push generate-vapid-keys>  (optional)
# VAPID_PRIVATE_KEY     = <from npx web-push generate-vapid-keys>  (optional)
# VAPID_SUBJECT         = mailto:it@iloilocity.gov.ph               (optional)
# VITE_VAPID_PUBLIC_KEY = <same as VAPID_PUBLIC_KEY>                (optional)
