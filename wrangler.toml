# Cloudflare Pages / Workers configuration
# https://developers.cloudflare.com/workers/wrangler/configuration/

name = "civic-metro-iloilo-dashboard"
compatibility_date = "2024-09-23"
pages_build_output_dir = "dist"

# ---- D1 Database binding ---------------------------------------------------
[[d1_databases]]
binding       = "DB"
database_name = "civic-iloilo-db"
database_id   = "f5c2e5d9-d5c7-45a9-acd5-f1e2d296bbba"

# ---- Cron Triggers ---------------------------------------------------------
# Handled by functions/scheduled.js (Cloudflare Pages Functions scheduled export)
#
# */5  * * * *  = Every 5 minutes  — PAGASA heat index + daily weather
# */30 * * * *  = Every 30 minutes — All sources (news, CDRRMO, MORE, MCWD, energy)
#
# Cron triggers for Pages must be added in the Cloudflare Dashboard:
#   Workers & Pages → civic-metro-iloilo-dashboard
#   → Settings → Functions → Cron Triggers → Add Cron Trigger
#   Add: */5 * * * *
#   Add: */30 * * * *
#
# For standalone Worker deployment, uncomment:
# [triggers]
# crons = ["*/5 * * * *", "*/30 * * * *"]

# ---- Environment variables (set in Cloudflare Pages dashboard) -------------
# JWT_SECRET            = <long random string>
# SCRAPE_SECRET         = <long random string for scraper auth>
# VAPID_PUBLIC_KEY      = <from npx web-push generate-vapid-keys>  (optional)
# VAPID_PRIVATE_KEY     = <from npx web-push generate-vapid-keys>  (optional)
# VAPID_SUBJECT         = mailto:it@iloilocity.gov.ph               (optional)
# VITE_VAPID_PUBLIC_KEY = <same as VAPID_PUBLIC_KEY>                (optional)
